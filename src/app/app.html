<div id="app-wrapper-id" class="app-wrapper hidden">

    <div class="navbar-port">
        <app-navbar
        (toggleSidePane)="toggleSidePane($event)"
        [activeIcon]=sidePaneStatus>
        </app-navbar>
    </div>

    <div class="mainPane-port">
        MAIN
    </div>

    @if (sidePaneStatus !== "hidden") {
    <div class="sidePane-port">
        <app-side-pane
        [sidePaneElement]="sidePaneStatus"
        (hideSidePane)="toggleSidePane('hidden')"
        (switchMode)="switchMode($event)">
        </app-side-pane>
    </div>
    }

    <div class="statusbar-port">
        <app-statusbar
        [activeMode]=activeMode
        ></app-statusbar>
    </div>
    
    <div class="cmdline-wrapper">
        Commandline
    </div>

</div>
