<div class="app-wrapper" [class.hidden]="layout.sidePaneState() === 'Hidden'">

    <div class="navbar-port">
        <app-navbar
        (toggleSidePane)="layout.toggleSidePane($event)"
        [activeIcon]="layout.sidePaneState()">
        </app-navbar>
    </div>

    <div class="mainPane-port">
        <app-main-pane></app-main-pane>
    </div>

    @if (layout.sidePaneState() !== "Hidden") {
    <div class="sidePane-port">
        <app-side-pane
        [sidePaneElement]="layout.sidePaneState()"
        (hideSidePane)="layout.toggleSidePane('Hidden')"
        (switchMode)="switchMode($event)">
        </app-side-pane>
    </div>
    }

    <div class="statusbar-port">
        <app-statusbar></app-statusbar>
    </div>
    
    <div class="cmdline-port">
        <app-cmd-line></app-cmd-line>
    </div>

</div>
